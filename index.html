<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>休み希望管理システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --green:#1D9E75; --green-lt:#E1F5EE; --green-dk:#0F6E56;
  --blue:#185FA5;  --blue-lt:#E6F1FB;
  --amber:#BA7517; --amber-lt:#FAEEDA;
  --red:#A32D2D;   --red-lt:#FCEBEB;
  --gray:#5F5E5A;  --gray-lt:#F1EFE8;
  --border:rgba(0,0,0,0.12);
  --text:#1a1a1a; --text-sub:#6b6b6b;
  --bg:#f7f7f5; --card:#ffffff;
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{max-width:760px;margin:0 auto;padding:16px}

/* ヘッダー */
.header{display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);
  padding:14px 18px;margin-bottom:14px}
.header h1{font-size:16px;font-weight:600}
.header-sub{font-size:12px;color:var(--text-sub);margin-top:2px}

/* タブ */
.tab-bar{display:flex;gap:4px;margin-bottom:14px;
  background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:6px}
.tab-btn{flex:1;padding:9px 8px;border:none;background:none;cursor:pointer;
  font-size:13px;color:var(--text-sub);border-radius:var(--radius-sm);font-weight:500;transition:all .15s}
.tab-btn.active{background:var(--green);color:#fff}
.tab-btn:not(.active):hover{background:var(--gray-lt)}

/* カード */
.card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);
  padding:16px 18px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

/* ログインボックス */
.login-wrap{max-width:360px;margin:0 auto}
.login-logo{text-align:center;padding:8px 0 20px;font-size:28px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text-sub);margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:10px 14px;border:0.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:16px;color:var(--text);background:var(--card);
  letter-spacing:2px;text-align:center}
.form-group input:focus{outline:2px solid var(--green);border-color:var(--green)}
.input-hint{font-size:11px;color:var(--text-sub);margin-top:4px;text-align:center}

/* ユーザー情報バー */
.user-bar{display:flex;align-items:center;justify-content:space-between;
  background:var(--green-lt);border-radius:var(--radius);border:0.5px solid var(--green);
  padding:12px 16px;margin-bottom:14px}
.user-bar-info{display:flex;align-items:center;gap:12px}
.user-avatar{width:38px;height:38px;border-radius:50%;background:var(--green);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:600;flex-shrink:0}
.user-name{font-weight:600;font-size:15px;color:var(--green-dk)}
.user-id{font-size:12px;color:var(--green-dk);opacity:.8;margin-top:1px;letter-spacing:1px}

/* フォーム汎用 */
.form-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.form-row label{font-size:12px;color:var(--text-sub);min-width:72px}
input[type=text],input[type=password],select{
  padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;color:var(--text);background:var(--card)}
input[type=text]:focus,input[type=password]:focus,select:focus{outline:2px solid var(--green);border-color:var(--green)}

/* ボタン */
.btn{padding:9px 16px;border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--card);cursor:pointer;font-size:13px;color:var(--text);
  transition:all .12s;font-weight:500;width:100%}
.btn:hover{background:var(--gray-lt)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green-dk)}
.btn-primary:hover{background:var(--green-dk)}
.btn-sm{padding:5px 12px;font-size:12px;width:auto}
.btn-danger{color:var(--red);border-color:var(--red);width:auto}
.btn-danger:hover{background:var(--red-lt)}
.btn-ghost{background:none;border:none;color:var(--text-sub);font-size:12px;cursor:pointer;width:auto;padding:4px 8px}
.btn-ghost:hover{color:var(--text)}

/* バッジ */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-k{background:var(--blue-lt);color:var(--blue)}
.badge-y{background:var(--green-lt);color:var(--green-dk)}
.badge-c{background:var(--amber-lt);color:var(--amber)}
.badge-id{background:var(--gray-lt);color:var(--gray);letter-spacing:1px}

/* 通知 */
.notice{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;line-height:1.6}
.notice-warn{background:var(--amber-lt);color:var(--amber);border:0.5px solid #EF9F27}
.notice-info{background:var(--green-lt);color:var(--green-dk);border:0.5px solid var(--green)}
.notice-err{background:var(--red-lt);color:var(--red);border:0.5px solid #E24B4A}

/* カレンダー */
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cal-nav .month-label{font-size:16px;font-weight:600;min-width:100px;text-align:center}
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(80px,1fr));gap:3px;min-width:560px}
.cal-hd{text-align:center;font-size:11px;font-weight:600;color:var(--text-sub);padding:6px 0}
.cal-hd.sun{color:#c0392b}
.cal-hd.sat{color:var(--blue)}
.cal-day{min-height:72px;border:0.5px solid var(--border);border-radius:6px;
  padding:4px 5px;background:var(--card);cursor:pointer;transition:border-color .12s}
.cal-day:hover{border-color:var(--green)}
.cal-day.empty{background:var(--bg);border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--green)!important;box-shadow:0 0 0 1.5px var(--green-lt)}
.cal-day.locked{cursor:default}
.cal-day.locked:hover{border-color:var(--border)}
.day-num{font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:3px}
.day-num.sun{color:#c0392b}
.day-num.sat{color:var(--blue)}
.day-entries{display:flex;flex-direction:column;gap:2px}
.entry{font-size:10px;padding:2px 4px;border-radius:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.entry-k{background:var(--blue-lt);color:var(--blue)}
.entry-y{background:var(--green-lt);color:var(--green-dk)}
.entry-c{background:var(--amber-lt);color:var(--amber)}

/* 凡例 */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-sub)}
.legend-dot{width:10px;height:10px;border-radius:2px}

/* タイプトグル */
.type-toggle{display:flex;gap:6px;margin-bottom:14px}
.type-btn{padding:6px 14px;border:0.5px solid var(--border);border-radius:20px;
  font-size:12px;cursor:pointer;background:var(--card);color:var(--text-sub);font-weight:500}
.type-btn.active-k{background:var(--blue-lt);color:var(--blue);border-color:var(--blue)}
.type-btn.active-y{background:var(--green-lt);color:var(--green-dk);border-color:var(--green)}

/* カウントバッジ */
.count-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.count-card{background:var(--bg);border-radius:var(--radius-sm);padding:8px 14px;text-align:center;min-width:70px}
.count-num{font-size:20px;font-weight:600}
.count-lbl{font-size:11px;color:var(--text-sub);margin-top:1px}

/* テーブル */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 10px;text-align:left;font-weight:600;font-size:12px;
  color:var(--text-sub);border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}

/* 従業員リスト */
.emp-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:0.5px solid var(--border)}
.emp-row:last-child{border-bottom:none}

/* メッセージ */
.msg{padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px;display:none}
.msg.show{display:block}
.msg-ok{background:var(--green-lt);color:var(--green-dk)}
.msg-err{background:var(--red-lt);color:var(--red)}

/* パスワード変更 */
.pw-change-area{border-top:0.5px solid var(--border);margin-top:14px;padding-top:14px}
.pw-change-area summary{font-size:13px;color:var(--text-sub);cursor:pointer;list-style:none;display:flex;align-items:center;gap:4px}
.pw-change-area summary::-webkit-details-marker{display:none}
.pw-change-area[open] summary{color:var(--text);margin-bottom:12px}

@media(max-width:480px){
  .app{padding:10px}
  .header h1{font-size:14px}
  .tab-btn{font-size:12px;padding:8px 4px}
  .cal-grid{min-width:490px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>📅 休み希望管理システム</h1>
      <div class="header-sub" id="currentDateLabel"></div>
    </div>
    <button class="btn btn-sm" onclick="showQR()">QR / URL</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-emp-btn" onclick="switchTab('emp')">従業員</button>
    <button class="tab-btn" id="tab-chief-btn" onclick="switchTab('chief')">チーフ管理</button>
  </div>

  <div id="tab-emp"></div>
  <div id="tab-chief" style="display:none"></div>
</div>

<script>
// ★ GAS デプロイ後に書き換えてください
const GAS_URL = "https://script.google.com/macros/s/AKfycbyyobgBgrA-TGa7oITJATmTWznEFoDOshh5pHi3o7n0ZgZcSh_wn4GbfgdYTvpZ__Codg/exec";

// ============================================================
//  状態
// ============================================================
const state = {
  emp: {
    view: "login",       // login | main
    empId: null,
    empName: null,
    password: null,      // セッション中のみ保持（ページリロードで消える）
    selType: "k",
    year: null,
    month: null
  },
  chief: {
    authed: false,
    password: "",
    selType: "k",
    selEmpId: null,
    year: new Date().getFullYear(),
    month: new Date().getMonth() + 1
  },
  employees: [],
  requests: []
};

// ============================================================
//  ユーティリティ
// ============================================================
function pad(n){ return String(n).padStart(2,'0'); }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function firstDayOfWeek(y,m){ return new Date(y,m-1,1).getDay(); }
function monthLabel(y,m){ return `${y}年${m}月`; }
function isDeadlinePassed(ty,tm){
  const pm = tm===1?12:tm-1, py = tm===1?ty-1:ty;
  return new Date() > new Date(py,pm-1,15,23,59,59);
}
function deadlineLabel(ty,tm){
  const pm = tm===1?12:tm-1, py = tm===1?ty-1:ty;
  return `${py}年${pm}月15日 23:59`;
}
function initials(name){
  const parts = name.replace(/\s+/g,'');
  return parts.length >= 2 ? parts.slice(0,1) : parts;
}
function showMsg(id,text,type){
  const el=document.getElementById(id); if(!el) return;
  el.textContent=text; el.className=`msg show msg-${type}`;
  setTimeout(()=>{el.className='msg';},4000);
}
function getTargetMonth(){
  const now = new Date();
  // 今月15日以前 → 翌月、15日以降 → 翌々月
  const cutoff = new Date(now.getFullYear(), now.getMonth(), 15, 23, 59, 59);
  let y = now.getFullYear(), m = now.getMonth() + 2; // 翌月(1-indexed)
  if(now > cutoff){ m++; } // 締切後は翌々月
  if(m > 12){ m -= 12; y++; }
  return { year: y, month: m };
}

// ============================================================
//  API
// ============================================================
async function apiGet(params){
  const url = GAS_URL + "?" + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}
async function apiPost(body){
  const res = await fetch(GAS_URL, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  return res.json();
}
async function loadEmployees(){
  const d = await apiGet({action:"getEmployees"});
  if(d.ok) state.employees = d.employees;
}
async function loadRequests(y,m){
  const d = await apiGet({action:"getRequests",year:y,month:m});
  if(d.ok) state.requests = d.requests;
}

// ============================================================
//  タブ
// ============================================================
function switchTab(t){
  document.getElementById("tab-emp").style.display  = t==="emp" ? "" : "none";
  document.getElementById("tab-chief").style.display = t==="chief" ? "" : "none";
  document.getElementById("tab-emp-btn").classList.toggle("active",t==="emp");
  document.getElementById("tab-chief-btn").classList.toggle("active",t==="chief");
  if(t==="emp") renderEmp(); else renderChief();
}

// ============================================================
//  従業員タブ
// ============================================================
function renderEmp(){
  const el = document.getElementById("tab-emp");

  if(state.emp.view === "login"){
    el.innerHTML = `
    <div class="login-wrap">
      <div class="login-logo">🗓️</div>
      <div class="card">
        <div class="card-title" style="justify-content:center;font-size:15px">従業員ログイン</div>
        <div class="form-group">
          <label>従業員番号（8桁）</label>
          <input type="password" inputmode="numeric" maxlength="8" id="loginId"
            placeholder="00000000" autocomplete="username" />
          <div class="input-hint">8桁の数字を入力してください</div>
        </div>
        <div class="form-group">
          <label>パスワード（8桁）</label>
          <input type="password" inputmode="numeric" maxlength="8" id="loginPw"
            placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') empLogin()" />
          <div class="input-hint">初期パスワードは従業員番号と同じです</div>
        </div>
        <button class="btn btn-primary" onclick="empLogin()" style="margin-top:4px">ログイン</button>
        <div id="loginMsg" class="msg"></div>
      </div>
    </div>`;
    return;
  }

  const { year, month, selType } = state.emp;
  const passed = isDeadlinePassed(year, month);
  const deadline = deadlineLabel(year, month);
  const myReqs = state.requests.filter(r => r.empId === state.emp.empId && r.source==="employee");
  const kCount = myReqs.filter(r=>r.type==="k").length;
  const yCount = myReqs.filter(r=>r.type==="y").length;
  const av = initials(state.emp.empName);

  const noticeHtml = passed
    ? `<div class="notice notice-err">⚠️ 締切（${deadline}）を過ぎました。<br>追加希望は<strong>用紙に記載してチーフに口頭でお伝えください。</strong></div>`
    : `<div class="notice notice-info">✅ <strong>${monthLabel(year,month)}分</strong>の申請締切は <strong>${deadline}</strong> です。</div>`;

  el.innerHTML = `
  <div class="user-bar">
    <div class="user-bar-info">
      <div class="user-avatar">${av}</div>
      <div>
        <div class="user-name">${state.emp.empName}</div>
        <div class="user-id">No. ${state.emp.empId}</div>
      </div>
    </div>
    <button class="btn-ghost" onclick="empLogout()">ログアウト</button>
  </div>

  ${noticeHtml}

  <div class="card">
    <div class="card-title">
      <span>${monthLabel(year,month)}の休み申請</span>
      <div class="count-row" style="margin-bottom:0">
        <div class="count-card"><div class="count-num" style="color:var(--blue)">${kCount}</div><div class="count-lbl">通常休み</div></div>
        <div class="count-card"><div class="count-num" style="color:var(--green)">${yCount}</div><div class="count-lbl">有給</div></div>
      </div>
    </div>

    ${!passed ? `
    <div class="type-toggle">
      <button class="type-btn ${selType==='k'?'active-k':''}" onclick="setEmpType('k')">通常休み</button>
      <button class="type-btn ${selType==='y'?'active-y':''}" onclick="setEmpType('y')">有給取得</button>
    </div>` : ''}

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>あなたの休み</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>あなたの有給</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>チーフ追加(★)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aaa"></div>他の従業員</div>
    </div>

    <div class="cal-nav">
      <button class="btn btn-sm" onclick="empPrevMonth()">◀</button>
      <span class="month-label">${monthLabel(year,month)}</span>
      <button class="btn btn-sm" onclick="empNextMonth()">▶</button>
    </div>
    <div class="cal-wrap">${buildCalendar(year,month,"emp")}</div>
    ${!passed?'<p style="font-size:12px;color:var(--text-sub);margin-top:8px">日付をタップして追加/削除できます</p>':''}
    <div id="empMsg" class="msg"></div>
  </div>

  <div class="card">
    <details class="pw-change-area">
      <summary>🔑 パスワードを変更する</summary>
      <div class="form-group">
        <label>現在のパスワード（8桁）</label>
        <input type="password" inputmode="numeric" maxlength="8" id="pwCurrent" placeholder="••••••••" style="max-width:200px" />
      </div>
      <div class="form-group">
        <label>新しいパスワード（8桁）</label>
        <input type="password" inputmode="numeric" maxlength="8" id="pwNew" placeholder="••••••••" style="max-width:200px" />
      </div>
      <div class="form-group">
        <label>新しいパスワード（確認）</label>
        <input type="password" inputmode="numeric" maxlength="8" id="pwNew2" placeholder="••••••••" style="max-width:200px" />
      </div>
      <button class="btn btn-primary" style="max-width:160px" onclick="changePassword()">変更する</button>
      <div id="pwMsg" class="msg"></div>
    </details>
  </div>`;
}

// ============================================================
//  カレンダー構築
// ============================================================
function buildCalendar(y,m,mode){
  const fd=firstDayOfWeek(y,m), days=daysInMonth(y,m);
  const today=new Date();
  const isToday=(d)=>today.getFullYear()===y && today.getMonth()===m-1 && today.getDate()===d;
  const passed=isDeadlinePassed(y,m);

  let html='<div class="cal-grid">';
  ['日','月','火','水','木','金','土'].forEach((h,i)=>{
    html+=`<div class="cal-hd ${i===0?'sun':i===6?'sat':''}">${h}</div>`;
  });
  for(let i=0;i<fd;i++) html+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=days;d++){
    const dow=(fd+d-1)%7;
    const dateStr=`${y}-${pad(m)}-${pad(d)}`;
    const dayReqs=state.requests.filter(r=>r.date===dateStr);
    let clickable = (mode==="emp" && !passed && state.emp.empId) || mode==="chief";
    let cls=`cal-day${isToday(d)?' today':''}${!clickable?' locked':''}`;

    let entries='';
    dayReqs.forEach(r=>{
      const emp=state.employees.find(e=>e.id===r.empId);
      const eName=emp ? emp.name.split(/\s/)[0] : r.empId;
      const etype=r.source==='chief'?'c':(r.type==='k'?'k':'y');

      if(mode==="emp"){
        if(r.empId===state.emp.empId){
          const lbl = r.source==='chief'
            ? (r.type==='k'?'★休み':'★有給')
            : (r.type==='k'?'休み':'有給');
          entries+=`<div class="entry entry-${etype}">${lbl}</div>`;
        } else {
          entries+=`<div class="entry entry-${etype}" style="opacity:.65">${eName}</div>`;
        }
      } else {
        const typeL=r.type==='k'?'休':'有';
        const srcL=r.source==='chief'?'★':'';
        entries+=`<div class="entry entry-${etype}">${srcL}${eName}(${typeL})</div>`;
      }
    });

    const clickFn=clickable?`onclick="handleDayClick('${dateStr}','${mode}')"`:'' ;
    html+=`<div class="${cls}" ${clickFn}>
      <div class="day-num ${dow===0?'sun':dow===6?'sat':''}">${d}</div>
      <div class="day-entries">${entries}</div>
    </div>`;
  }
  html+='</div>';
  return html;
}

// ============================================================
//  日付クリック
// ============================================================
async function handleDayClick(dateStr,mode){
  if(mode==="emp"){
    if(!state.emp.empId || !state.emp.password) return;
    const existing=state.requests.find(r=>r.date===dateStr && r.empId===state.emp.empId && r.source==="employee");
    if(existing){
      const res=await apiPost({action:"deleteRequest",empId:state.emp.empId,
        password:state.emp.password,date:dateStr,year:state.emp.year,month:state.emp.month});
      if(res.ok){
        state.requests=state.requests.filter(r=>!(r.date===dateStr && r.empId===state.emp.empId && r.source==="employee"));
        renderEmp();
      } else showMsg("empMsg",res.error||"エラー","err");
    } else {
      const res=await apiPost({action:"saveRequest",empId:state.emp.empId,
        password:state.emp.password,date:dateStr,type:state.emp.selType,
        year:state.emp.year,month:state.emp.month});
      if(res.ok){
        state.requests.push({empId:state.emp.empId,date:dateStr,type:state.emp.selType,source:"employee"});
        renderEmp();
      } else showMsg("empMsg",res.error||"エラー","err");
    }
  } else {
    if(!state.chief.authed || !state.chief.selEmpId) return;
    const res=await apiPost({action:"chiefSaveRequest",empId:state.chief.selEmpId,
      password:state.chief.password,date:dateStr,type:state.chief.selType,
      year:state.chief.year,month:state.chief.month});
    if(res.ok){
      if(res.action==="deleted"){
        state.requests=state.requests.filter(r=>!(r.date===dateStr && r.empId===state.chief.selEmpId && r.source==="chief"));
      } else {
        state.requests.push({empId:state.chief.selEmpId,date:dateStr,type:state.chief.selType,source:"chief"});
      }
      renderChief();
    } else showMsg("chiefMsg",res.error||"エラー","err");
  }
}

// ============================================================
//  ログイン / ログアウト
// ============================================================
async function empLogin(){
  const id=document.getElementById("loginId").value.trim();
  const pw=document.getElementById("loginPw").value.trim();
  if(!/^\d{8}$/.test(id)){ showMsg("loginMsg","従業員番号は8桁の数字を入力してください","err"); return; }
  if(!/^\d{8}$/.test(pw)){ showMsg("loginMsg","パスワードは8桁の数字を入力してください","err"); return; }

  const btn=document.querySelector('.login-wrap .btn-primary');
  btn.textContent="確認中..."; btn.disabled=true;

  const res=await apiPost({action:"empLogin",empId:id,password:pw});

  btn.textContent="ログイン"; btn.disabled=false;

  if(res.ok){
    state.emp.empId=res.empId;
    state.emp.empName=res.name;
    state.emp.password=pw;   // セッション中のみ保持
    state.emp.view="main";
    const {year,month}=getTargetMonth();
    state.emp.year=year; state.emp.month=month;
    if(!state.employees.length) await loadEmployees();
    await loadRequests(year,month);
    renderEmp();
  } else {
    showMsg("loginMsg",res.error||"ログインに失敗しました","err");
  }
}
function empLogout(){
  state.emp.view="login"; state.emp.empId=null;
  state.emp.empName=null; state.emp.password=null;
  renderEmp();
}
function setEmpType(t){ state.emp.selType=t; renderEmp(); }
async function empPrevMonth(){
  if(state.emp.month===1){state.emp.month=12;state.emp.year--;}
  else state.emp.month--;
  await loadRequests(state.emp.year,state.emp.month); renderEmp();
}
async function empNextMonth(){
  if(state.emp.month===12){state.emp.month=1;state.emp.year++;}
  else state.emp.month++;
  await loadRequests(state.emp.year,state.emp.month); renderEmp();
}

async function changePassword(){
  const cur=document.getElementById("pwCurrent").value.trim();
  const nw=document.getElementById("pwNew").value.trim();
  const nw2=document.getElementById("pwNew2").value.trim();
  if(!/^\d{8}$/.test(nw)){ showMsg("pwMsg","新しいパスワードは8桁の数字を入力してください","err"); return; }
  if(nw!==nw2){ showMsg("pwMsg","新しいパスワードが一致しません","err"); return; }
  const res=await apiPost({action:"changePassword",empId:state.emp.empId,currentPassword:cur,newPassword:nw});
  if(res.ok){
    state.emp.password=nw;
    showMsg("pwMsg","パスワードを変更しました","ok");
  } else showMsg("pwMsg",res.error||"エラー","err");
}

// ============================================================
//  チーフタブ
// ============================================================
function renderChief(){
  const el=document.getElementById("tab-chief");
  if(!state.chief.authed){
    el.innerHTML=`
    <div class="card" style="max-width:360px;margin:0 auto">
      <div class="card-title" style="justify-content:center;font-size:15px">チーフ認証</div>
      <div class="form-group">
        <label>チーフパスワード</label>
        <input type="password" id="cpw" placeholder="パスワードを入力"
          onkeydown="if(event.key==='Enter') chiefAuth()" style="max-width:100%;text-align:center" />
      </div>
      <button class="btn btn-primary" onclick="chiefAuth()">認証</button>
      <div id="cpwMsg" class="msg"></div>
    </div>`;
    return;
  }

  const {year,month,selType}=state.chief;
  const selEmp=state.chief.selEmpId||(state.employees[0]?.id);
  if(!state.chief.selEmpId && state.employees.length) state.chief.selEmpId=state.employees[0].id;

  const summary=state.employees.filter(e=>e.active).map(e=>{
    const r=state.requests.filter(req=>req.empId===e.id);
    return {...e, k:r.filter(x=>x.type==='k').length, y:r.filter(x=>x.type==='y').length, total:r.length};
  });

  const empListHtml=state.employees.map(e=>`
    <div class="emp-row">
      <div>
        <span style="font-weight:600">${e.name}</span>
        <span class="badge badge-id" style="margin-left:6px">${e.id}</span>
        ${!e.active?'<span class="badge" style="background:#ddd;color:#888;margin-left:4px">無効</span>':''}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm" onclick="resetEmpPw('${e.id}')">PW初期化</button>
        <button class="btn btn-sm" onclick="toggleEmp('${e.id}')">${e.active?'無効化':'有効化'}</button>
        <button class="btn btn-sm btn-danger" onclick="deleteEmp('${e.id}')">削除</button>
      </div>
    </div>`).join('');

  el.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-weight:600;font-size:15px">チーフ管理</span>
    <button class="btn-ghost" onclick="chiefLogout()">ログアウト</button>
  </div>

  <div class="card">
    <div class="card-title">従業員管理</div>
    ${empListHtml}
    <div style="margin-top:14px;border-top:0.5px solid var(--border);padding-top:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:10px">新規追加</div>
      <div class="form-row">
        <label>従業員番号</label>
        <input type="text" inputmode="numeric" maxlength="8" id="newId" placeholder="8桁の数字" style="max-width:130px" />
      </div>
      <div class="form-row">
        <label>氏名</label>
        <input type="text" id="newName" placeholder="例: 山田 次郎" style="max-width:180px" />
      </div>
      <div class="form-row">
        <label>初期PW</label>
        <input type="text" inputmode="numeric" maxlength="8" id="newPw"
          placeholder="空欄 = 番号と同じ" style="max-width:160px" />
      </div>
      <button class="btn btn-primary" style="max-width:120px;margin-top:4px" onclick="addEmp()">追加</button>
      <div id="empAddMsg" class="msg"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span>カレンダー（全員）</span>
      <div class="cal-nav" style="margin-bottom:0">
        <button class="btn btn-sm" onclick="chiefPrevMonth()">◀</button>
        <span class="month-label" style="font-size:14px">${monthLabel(year,month)}</span>
        <button class="btn btn-sm" onclick="chiefNextMonth()">▶</button>
      </div>
    </div>

    <div class="form-row" style="flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <label>対象従業員</label>
        <select onchange="setChiefEmp(this.value)" style="max-width:190px">
          ${state.employees.filter(e=>e.active).map(e=>`
            <option value="${e.id}" ${e.id===selEmp?'selected':''}>${e.name} (${e.id})</option>`).join('')}
        </select>
      </div>
      <div class="type-toggle" style="margin-bottom:0">
        <button class="type-btn ${selType==='k'?'active-k':''}" onclick="setChiefType('k')">通常休み</button>
        <button class="type-btn ${selType==='y'?'active-y':''}" onclick="setChiefType('y')">有給</button>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>申請 休み</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>申請 有給</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>★チーフ追加</div>
    </div>
    <div class="notice notice-warn" style="margin-bottom:10px">選択した従業員の日付をタップしてチーフ追加（再タップで削除）</div>
    <div class="cal-wrap">${buildCalendar(year,month,"chief")}</div>
    <div id="chiefMsg" class="msg"></div>
  </div>

  <div class="card">
    <div class="card-title">${monthLabel(year,month)} 全員集計</div>
    <table>
      <thead><tr><th>氏名</th><th>番号</th><th>通常休み</th><th>有給</th><th>合計</th></tr></thead>
      <tbody>
      ${summary.map(e=>`<tr>
        <td>${e.name}</td>
        <td><span class="badge badge-id">${e.id}</span></td>
        <td><span class="badge badge-k">${e.k}日</span></td>
        <td><span class="badge badge-y">${e.y}日</span></td>
        <td><strong>${e.total}日</strong></td>
      </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

async function chiefAuth(){
  const pw=document.getElementById("cpw").value;
  const d=await apiGet({action:"checkChiefAuth",password:pw});
  if(d.ok){
    state.chief.authed=true; state.chief.password=pw;
    await loadEmployees();
    await loadRequests(state.chief.year,state.chief.month);
    renderChief();
  } else showMsg("cpwMsg","パスワードが違います","err");
}
function chiefLogout(){ state.chief.authed=false; renderChief(); }
function setChiefType(t){ state.chief.selType=t; renderChief(); }
function setChiefEmp(id){ state.chief.selEmpId=id; renderChief(); }
async function chiefPrevMonth(){
  if(state.chief.month===1){state.chief.month=12;state.chief.year--;}
  else state.chief.month--;
  await loadRequests(state.chief.year,state.chief.month); renderChief();
}
async function chiefNextMonth(){
  if(state.chief.month===12){state.chief.month=1;state.chief.year++;}
  else state.chief.month++;
  await loadRequests(state.chief.year,state.chief.month); renderChief();
}
async function addEmp(){
  const id=document.getElementById("newId").value.trim();
  const name=document.getElementById("newName").value.trim();
  const pw=document.getElementById("newPw").value.trim()||id;
  const res=await apiPost({action:"addEmployee",id,name,password:pw,chiefPassword:state.chief.password});
  if(res.ok){
    state.employees.push({id,name,active:true});
    showMsg("empAddMsg","追加しました","ok");
    document.getElementById("newId").value="";
    document.getElementById("newName").value="";
    document.getElementById("newPw").value="";
    renderChief();
  } else showMsg("empAddMsg",res.error||"エラー","err");
}
async function toggleEmp(id){
  const res=await apiPost({action:"toggleEmployee",id,chiefPassword:state.chief.password});
  if(res.ok){ const e=state.employees.find(e=>e.id===id); if(e) e.active=res.active; renderChief(); }
}
async function deleteEmp(id){
  if(!confirm("この従業員を削除しますか？")) return;
  const res=await apiPost({action:"deleteEmployee",id,chiefPassword:state.chief.password});
  if(res.ok){ state.employees=state.employees.filter(e=>e.id!==id); renderChief(); }
}
async function resetEmpPw(id){
  if(!confirm(`従業員番号 ${id} のパスワードを初期値（番号と同じ）に戻しますか？`)) return;
  const res=await apiPost({action:"resetPassword",id,chiefPassword:state.chief.password});
  if(res.ok) alert("パスワードを初期化しました（初期値: "+id+"）");
  else alert(res.error||"エラーが発生しました");
}

// ============================================================
//  QR モーダル
// ============================================================
function showQR(){
  const url=location.href.split('?')[0];
  let m=document.getElementById("qrModal");
  if(m){ m.remove(); return; }
  m=document.createElement("div");
  m.id="qrModal";
  m.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px";
  m.innerHTML=`
  <div style="background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center">
    <div style="font-weight:600;font-size:15px;margin-bottom:4px">アクセス用 QR / URL</div>
    <p style="font-size:12px;color:var(--text-sub);margin-bottom:16px">スキャンしてアクセス</p>
    <div id="qr-box" style="display:flex;justify-content:center;margin-bottom:14px"></div>
    <div style="word-break:break-all;font-size:11px;color:var(--text-sub);
      background:var(--bg);padding:8px;border-radius:8px;margin-bottom:14px">${url}</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary btn-sm" onclick="navigator.clipboard.writeText('${url}').then(()=>alert('URLをコピーしました'))">URLをコピー</button>
      <button class="btn btn-sm" onclick="document.getElementById('qrModal').remove()">閉じる</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener("click",e=>{ if(e.target===m) m.remove(); });
  setTimeout(()=>{
    try{ new QRCode(document.getElementById("qr-box"),{text:url,width:180,height:180,colorDark:"#1a1a1a",colorLight:"#ffffff"}); }
    catch(e){ document.getElementById("qr-box").textContent=url; }
  },100);
}
